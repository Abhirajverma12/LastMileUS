version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: delivery_user
      POSTGRES_PASSWORD: delivery_password
      POSTGRES_DB: delivery_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://delivery_user:delivery_password@db:5432/delivery_tracker
      - JWT_SECRET=thisismysecretkeyforlastmiledeliverytracker123!
      - JWT_EXPIRES_IN=24h
      - PORT=3000
    depends_on:
      - db
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
